---
name: Test

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - 'vitest.config.ts'
      - '.github/workflows/test.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - 'vitest.config.ts'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        if: >-
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        run: bun run test
        env:
          ANTON_LOGIN_CODE: ${{ secrets.ANTON_LOGIN_CODE }}
          ANTON_GROUP: Test
