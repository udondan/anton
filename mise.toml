[tools]
node = "lts"
bun = "1.3.12"

[tasks.install]
description = "Install dependencies"
run = "bun install"

[tasks.build]
description = "Compile TypeScript to dist/"
run = "bun run build"

[tasks.dev]
description = "Watch mode — recompile on changes"
run = "bun run dev"

[tasks.test]
description = "Run all tests (requires ANTON_LOGIN_CODE)"
run = "bun run test"

[tasks."test:watch"]
description = "Run tests in watch mode"
run = "bun run test:watch"

[tasks.lint]
description = "Lint src/ and test/"
run = "bun run lint"

[tasks."lint:fix"]
description = "Lint and auto-fix src/ and test/"
run = "bun run lint:fix"

[tasks.format]
description = "Format src/ and test/ with Prettier"
run = "bun run format"
